services:

  postgres-source:
    image: postgres:16
    container_name: spark-postgres-source
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: cdc_user
      POSTGRES_PASSWORD: cdc_pass
      POSTGRES_DB: source_db
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - ./postgres-source/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./postgres-source/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./postgres-source/02-seed-data.sql:/docker-entrypoint-initdb.d/02-seed-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdc_user -d source_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-cdc:
    image: postgres:16
    container_name: spark-postgres-cdc
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: cdc_user
      POSTGRES_PASSWORD: cdc_pass
      POSTGRES_DB: cdc_db
    volumes:
      - ./postgres-cdc/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdc_user -d cdc_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: spark-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: spark-kafka
    ports:
      - "9092:9092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15

  kafka-connect:
    image: debezium/connect:2.5
    container_name: spark-kafka-connect
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      postgres-source:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: cdc-connect-group
      CONFIG_STORAGE_TOPIC: _connect_configs
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  spark:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-streaming
    depends_on:
      kafka-connect:
        condition: service_healthy
      postgres-cdc:
        condition: service_healthy
    volumes:
      - ./spark-app:/opt/spark-app
    command: >
      /opt/spark/bin/spark-submit
        --master local[2]
        --conf spark.driver.extraJavaOptions=-Divy.cache.dir=/tmp
        /opt/spark-app/cdc_streaming.py

  merge-listener:
    build:
      context: .
      dockerfile: Dockerfile.merge
    container_name: spark-merge-listener
    volumes:
      - ./scripts:/usr/app/scripts
    environment:
      PGHOST: postgres-cdc
      PGPORT: "5432"
      PGUSER: cdc_user
      PGPASSWORD: cdc_pass
      PGDATABASE: cdc_db
      DEBOUNCE_SECONDS: "2"
      INITIAL_WAIT_SECONDS: "60"
    depends_on:
      postgres-cdc:
        condition: service_healthy
      spark:
        condition: service_started
    entrypoint: ["python3", "/usr/app/scripts/event-trigger-merge.py"]
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: spark-pgadmin
    ports:
      - "5051:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/tmp/pgpass
    depends_on:
      postgres-source:
        condition: service_healthy
      postgres-cdc:
        condition: service_healthy

  setup:
    image: curlimages/curl:latest
    container_name: spark-setup
    depends_on:
      kafka-connect:
        condition: service_healthy
      spark:
        condition: service_started
    volumes:
      - ./debezium/register-connector.json:/opt/setup/register-connector.json:ro
      - ./scripts/setup.sh:/opt/setup/setup.sh:ro
    entrypoint: ["/bin/sh", "/opt/setup/setup.sh"]
    restart: "no"
